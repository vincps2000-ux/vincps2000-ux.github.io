                `;
                widget.appendChild(inputs);

                // Info line
                const info = document.createElement('div');
                info.className = 'runtarget-info';
                info.textContent = 'Allow location access, set a range, and hit Pick Target.';
                widget.appendChild(info);

                // Map container
                const mapDiv = document.createElement('div');
                mapDiv.className = 'runtarget-map';
                widget.appendChild(mapDiv);

                container.appendChild(widget);

                // Init Leaflet map after element is in DOM
                setTimeout(() => {
                    const map = L.map(mapDiv).setView([51.505, -0.09], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                        maxZoom: 19
                    }).addTo(map);

                    let userMarker = null;
                    let targetMarker = null;
                    let circle = null;
                    let routeLine = null;
                    let userPos = null;

                    const minInput = inputs.querySelector('.rt-min');
                    const maxInput = inputs.querySelector('.rt-max');
                    const goBtn   = inputs.querySelector('.rt-go');

                    // Try to get user location
                    function locateUser(){
                        if(!navigator.geolocation){
                            info.textContent = '⚠ Geolocation not supported by this browser.';
                            return;
                        }
                        info.textContent = '📍 Locating you...';
                        navigator.geolocation.getCurrentPosition(pos => {
                            userPos = [pos.coords.latitude, pos.coords.longitude];
                            map.setView(userPos, 14);
                            if(userMarker) map.removeLayer(userMarker);
                            userMarker = L.marker(userPos, {
                                icon: L.divIcon({
                                    html: '<div style="background:#2b6cb0;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>',
                                    iconSize: [20,20],
                                    iconAnchor: [10,10],
                                    className: ''
                                })
                            }).addTo(map).bindPopup('You are here');
                            info.textContent = '✅ Location found! Set range and pick a target.';
                        }, err => {
                            info.textContent = '⚠ Location denied: ' + err.message;
                        }, { enableHighAccuracy: true, timeout: 10000 });
                    }

                    locateUser();

                    // Generate a random point at a random distance & bearing from origin
                    function randomPoint(lat, lng, minKm, maxKm){
                        const R = 6371; // Earth radius km
                        const dist = minKm + Math.random() * (maxKm - minKm);
                        const bearing = Math.random() * 2 * Math.PI;
                        const lat1 = lat * Math.PI / 180;
                        const lng1 = lng * Math.PI / 180;
                        const lat2 = Math.asin(
                            Math.sin(lat1) * Math.cos(dist / R) +
                            Math.cos(lat1) * Math.sin(dist / R) * Math.cos(bearing)
                        );
                        const lng2 = lng1 + Math.atan2(
                            Math.sin(bearing) * Math.sin(dist / R) * Math.cos(lat1),
                            Math.cos(dist / R) - Math.sin(lat1) * Math.sin(lat2)
                        );
                        return {
                            lat: lat2 * 180 / Math.PI,
                            lng: lng2 * 180 / Math.PI,
                            distKm: dist
                        };
                    }

                    goBtn.addEventListener('click', () => {
                        if(!userPos){
                            info.textContent = '⚠ Still waiting for your location...';
                            locateUser();
                            return;
                        }
                        const minKm = parseFloat(minInput.value) || 0.5;
                        const maxKm = parseFloat(maxInput.value) || 5;
                        if(minKm >= maxKm){
                            info.textContent = '⚠ Min must be less than Max.';
                            return;
                        }
                        if(minKm < 0 || maxKm <= 0){
                            info.textContent = '⚠ Ranges must be positive.';
                            return;
                        }

                        const pt = randomPoint(userPos[0], userPos[1], minKm, maxKm);

                        // Clear previous target layers
                        if(targetMarker) map.removeLayer(targetMarker);
                        if(circle) map.removeLayer(circle);
                        if(routeLine) map.removeLayer(routeLine);

                        // Draw range ring (donut visualized as outer circle)
                        circle = L.circle(userPos, {
                            radius: maxKm * 1000,
                            color: 'var(--accent)',
                            weight: 2,
                            opacity: 0.4,
                            fillColor: '#2b6cb0',
                            fillOpacity: 0.06
                        }).addTo(map);

                        // Place target marker
                        targetMarker = L.marker([pt.lat, pt.lng], {
                            icon: L.divIcon({
                                html: '<div style="font-size:28px;text-shadow:0 2px 4px rgba(0,0,0,.3)">🎯</div>',
                                iconSize: [28,28],
                                iconAnchor: [14,14],
                                className: ''
                            })
                        }).addTo(map).bindPopup(
                            `<b>Run Target</b><br>${pt.distKm.toFixed(2)} km away`
                        ).openPopup();

                        // Draw dashed line from user to target
                        routeLine = L.polyline([userPos, [pt.lat, pt.lng]], {
                            color: '#e53e3e',
                            weight: 2,
                            dashArray: '8, 6',
                            opacity: 0.7
                        }).addTo(map);

                        // Fit map to show both points
                        const bounds = L.latLngBounds([userPos, [pt.lat, pt.lng]]).pad(0.15);
                        map.fitBounds(bounds);

                        const gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${userPos[0]},${userPos[1]}&destination=${pt.lat},${pt.lng}&travelmode=walking`;
                        info.innerHTML = `🏃 Target placed ${pt.distKm.toFixed(2)} km away — <a href="${gmapsUrl}" target="_blank" rel="noopener noreferrer" style="color:var(--accent);font-weight:600">Open route in Google Maps ↗</a>`;
                    });

                    // Fix Leaflet rendering in hidden containers
                    const observer = new MutationObserver(() => {
                        if(mapDiv.offsetParent !== null) map.invalidateSize();
                    });
                    observer.observe(document.body, { attributes: true, subtree: true });
                }, 50);
            };

            // ---- Element Extractor demo ----
            DEMOS['element-extractor'] = function(container){
                const widget = document.createElement('div');
                widget.className = 'extractor-widget';

                // Inputs row
                const inputs = document.createElement('div');
                inputs.className = 'extractor-inputs';
                inputs.innerHTML = `
                    <label>URL:</label>
                    <input type="text" class="ext-url" placeholder="https://example.com">
                    <label>Element:</label>
                    <input type="text" class="ext-selector" placeholder="h1, .class, #id">
                    <button class="extractor-btn ext-go">🔍 Fetch Element</button>
                `;
                widget.appendChild(inputs);

                // Info line
                const info = document.createElement('div');
                info.className = 'extractor-info';
                info.textContent = 'Enter a URL and a CSS selector, then click Fetch.';
                widget.appendChild(info);

                // Output container
                const output = document.createElement('div');
                output.className = 'extractor-output';
                widget.appendChild(output);

                container.appendChild(widget);

                const urlInput = inputs.querySelector('.ext-url');
                const selInput = inputs.querySelector('.ext-selector');
                const goBtn    = inputs.querySelector('.ext-go');

                goBtn.addEventListener('click', async () => {
                    const url = urlInput.value.trim();
                    const selector = selInput.value.trim();

                    if(!url){
                        info.textContent = '⚠ Please enter a URL.';
                        return;
                    }
                    if(!selector){
                        info.textContent = '⚠ Please enter a CSS selector.';
                        return;
                    }

                    // Validate selector syntax
                    try { document.createElement('div').querySelector(selector); }
                    catch(e){
                        info.textContent = '⚠ Invalid CSS selector: ' + e.message;
                        return;
                    }

                    info.textContent = '⏳ Fetching page…';
                    goBtn.disabled = true;
                    output.innerHTML = '';

                    try {
                        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                        const resp = await fetch(proxyUrl);
                        if(!resp.ok) throw new Error('HTTP ' + resp.status);
                        const html = await resp.text();

                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        const el = doc.querySelector(selector);

                        if(!el){
                            info.textContent = '⚠ No element matched "' + selector + '" on that page.';
                            goBtn.disabled = false;
                            return;
                        }

                        // Collect <style> and <link rel="stylesheet"> from the fetched page
                        const styles = Array.from(doc.querySelectorAll('style, link[rel="stylesheet"]'))
                            .map(n => n.outerHTML).join('\n');

                        // Build srcdoc with <base> so relative resources resolve
                        const base = url.replace(/\/[^\/]*$/, '/');
                        const srcdoc = `<!DOCTYPE html><html><head><base href="${base}"><meta charset="utf-8">${styles}<style>body{margin:0;font-family:system-ui,sans-serif}</style></head><body>${el.outerHTML}</body></html>`;

                        const iframe = document.createElement('iframe');
                        iframe.sandbox = 'allow-same-origin';
                        iframe.srcdoc = srcdoc;
                        iframe.style.width = '100%';
                        iframe.style.minHeight = '300px';
                        iframe.style.border = '1px solid var(--border)';
                        iframe.style.borderRadius = '8px';
                        iframe.style.background = '#fff';
                        output.appendChild(iframe);

                        // Auto-resize iframe height to content
                        iframe.addEventListener('load', () => {
                            try {
                                const h = iframe.contentDocument.documentElement.scrollHeight;
                                iframe.style.height = Math.min(Math.max(h + 20, 100), 800) + 'px';
                            } catch(e){/* cross-origin */}
                        });

                        info.innerHTML = '✅ Extracted <code>' + selector + '</code> from <a href="' + url + '" target="_blank" style="color:var(--accent)">' + url + '</a>';
                    } catch(err){
                        info.textContent = '❌ Fetch failed: ' + err.message;
                    } finally {
                        goBtn.disabled = false;
                    }
                });
            };

            // ---- Color Mixer demo ----
            DEMOS['color-mixer'] = function(container){
                // RYB trilinear cube corners – maps (R,Y,B) ∈ [0,1]³ to RGB ∈ [0,1]³
                // This is the Itten/artist RYB model so mixing behaves like pigments.
                const C = {
                    '000': [1,      1,     1    ], // white
                    '100': [1,      0,     0    ], // red
                    '010': [1,      1,     0    ], // yellow
                    '110': [1,      0.5,   0    ], // orange
                    '001': [0.163,  0.373, 0.6  ], // blue
                    '101': [0.5,    0,     0.5  ], // violet
                    '011': [0,      0.66,  0.2  ], // green
                    '111': [0.2,    0.094, 0    ]  // dark brown (all three primaries)
                };

                function rybToRgb(r, y, b){
                    return [0, 1, 2].map(i => {
                        const c00 = C['000'][i] + r*(C['100'][i]-C['000'][i]);
                        const c01 = C['001'][i] + r*(C['101'][i]-C['001'][i]);
                        const c10 = C['010'][i] + r*(C['110'][i]-C['010'][i]);
                        const c11 = C['011'][i] + r*(C['111'][i]-C['011'][i]);
                        const c0  = c00 + y*(c10-c00);
                        const c1  = c01 + y*(c11-c01);
                        return Math.max(0, Math.min(1, c0 + b*(c1-c0)));
                    });
                }

                function mixRyb(rybList){
                    if(!rybList.length) return [1,1,1];
                    const n = rybList.length;
                    const avg = rybList.reduce((s,c)=>[s[0]+c[0],s[1]+c[1],s[2]+c[2]], [0,0,0])
                                      .map(v => v/n);
                    return rybToRgb(avg[0], avg[1], avg[2]);
                }

                function rgbToHex(rgb){
                    return '#' + rgb.map(v => Math.round(v*255).toString(16).padStart(2,'0')).join('');
                }

                // Base-color swatches: hex is the display colour, ryb is the RYB mixing coordinate
                const swatches = [
                    { name:'Red',    hex:'#DC143C', ryb:[1,    0,    0   ] },
                    { name:'Orange', hex:'#FF6600', ryb:[0.7,  0.7,  0   ] },
                    { name:'Yellow', hex:'#FFD700', ryb:[0,    1,    0   ] },
                    { name:'Green',  hex:'#228B22', ryb:[0,    0.45, 0.55] },
                    { name:'Blue',   hex:'#2255BB', ryb:[0,    0,    1   ] },
                    { name:'Violet', hex:'#6600CC', ryb:[0.5,  0,    0.5 ] },
                    { name:'White',  hex:'#F0F0F0', ryb:[0,    0,    0   ] },
                    { name:'Black',  hex:'#1A1A1A', ryb:[1,    1,    1   ] }
                ];

                const cauldronContent = []; // { hex, ryb }

                // ---- build DOM ----
                const widget = document.createElement('div');
                widget.className = 'color-mixer-widget';

                // Instructions
                const hint = document.createElement('div');
                hint.style.cssText = 'font-size:.82rem;color:var(--muted);text-align:center;max-width:340px';
                hint.textContent = 'Drag or click a colour to add it to the cauldron. Mix colours to discover new hues!';
                widget.appendChild(hint);

                // Palette
                const palette = document.createElement('div');
                palette.className = 'cm-palette';
                widget.appendChild(palette);

                swatches.forEach(sw => {
                    const wrap = document.createElement('div');
                    wrap.className = 'cm-swatch-wrap';

                    const swatch = document.createElement('div');
                    swatch.className = 'cm-swatch';
                    swatch.style.background = sw.hex;
                    swatch.title = 'Add ' + sw.name;
                    swatch.setAttribute('draggable', 'true');

                    swatch.addEventListener('dragstart', e => {
                        e.dataTransfer.setData('text/plain', sw.name);
                        e.dataTransfer.effectAllowed = 'copy';
                    });
                    swatch.addEventListener('click', () => addToCauldron(sw));

                    const lbl = document.createElement('div');
                    lbl.className = 'cm-swatch-label';
                    lbl.textContent = sw.name;

                    wrap.appendChild(swatch);
                    wrap.appendChild(lbl);
                    palette.appendChild(wrap);
                });

                // Cauldron area
                const cauldronArea = document.createElement('div');
                cauldronArea.className = 'cm-cauldron-area';
                widget.appendChild(cauldronArea);

                const cauldronEl = document.createElement('div');
                cauldronEl.className = 'cm-cauldron';
                cauldronArea.appendChild(cauldronEl);

                const rim = document.createElement('div');
                rim.className = 'cm-rim';
                cauldronEl.appendChild(rim);

                const pot = document.createElement('div');
                pot.className = 'cm-pot';
                cauldronEl.appendChild(pot);

                const fill = document.createElement('div');
                fill.className = 'cm-fill';
                fill.style.background = '#f0f0f0';
                pot.appendChild(fill);

                const dropHint = document.createElement('div');
                dropHint.className = 'cm-drop-hint';
                dropHint.textContent = '🫙 Drop here';
                pot.appendChild(dropHint);

                // Drag-and-drop on the pot
                pot.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'copy';
                    pot.classList.add('cm-drag-over');
                });
                pot.addEventListener('dragleave', () => pot.classList.remove('cm-drag-over'));
                pot.addEventListener('drop', e => {
                    e.preventDefault();
                    pot.classList.remove('cm-drag-over');
                    const name = e.dataTransfer.getData('text/plain');
                    const sw = swatches.find(s => s.name === name);
                    if(sw) addToCauldron(sw);
                });

                // Hex display
                const hexDisplay = document.createElement('div');
                hexDisplay.className = 'cm-hex-display';
                cauldronArea.appendChild(hexDisplay);

                const hexSwatch = document.createElement('div');
                hexSwatch.className = 'cm-hex-swatch';
                hexSwatch.style.background = '#f0f0f0';

                const hexCode = document.createElement('span');
                hexCode.className = 'cm-hex-code';
                hexCode.textContent = '#F0F0F0';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'cm-copy-btn';
                copyBtn.textContent = '📋 Copy';
                copyBtn.addEventListener('click', () => {
                    const val = hexCode.textContent;
                    if(navigator.clipboard){
                        navigator.clipboard.writeText(val).then(() => flash());
                    } else {

                    function flash(){
                        copyBtn.textContent = '✅ Copied!';
                        setTimeout(() => copyBtn.textContent = '📋 Copy', 1500);

                });

                hexDisplay.appendChild(hexSwatch);
                hexDisplay.appendChild(hexCode);

                // Ingredient dots
                const ingredientsRow = document.createElement('div');

                const actions = document.createElement('div');
                actions.className = 'cm-actions';

                const undoBtn = document.createElement('button');
                undoBtn.className = 'cm-undo-btn';
                undoBtn.textContent = '↩ Undo';
                undoBtn.disabled = true;
                undoBtn.addEventListener('click', () => {
                    if(cauldronContent.length) { cauldronContent.pop(); updateCauldron(); }
                });
                actions.appendChild(undoBtn);

                const resetBtn = document.createElement('button');
                resetBtn.className = 'cm-reset-btn';
                resetBtn.textContent = '🗑️ Reset';
                resetBtn.disabled = true;
                resetBtn.addEventListener('click', () => {
                    cauldronContent.length = 0;
                    updateCauldron();
                });
                actions.appendChild(resetBtn);

                container.appendChild(widget);

                // ---- logic ----
                function addToCauldron(sw){
                    cauldronContent.push({ hex: sw.hex, ryb: sw.ryb });
                    updateCauldron();
                    // Bubbles
                    for(let i = 0; i < 4; i++){
                        setTimeout(() => {
                            const b = document.createElement('div');
                            b.className = 'cm-bubble';
                            const size = 6 + Math.random() * 8;
                            b.style.cssText = `width:${size}px;height:${size}px;left:${10+Math.random()*80}%;bottom:${5+Math.random()*20}%`;
                            pot.appendChild(b);
                            b.addEventListener('animationend', () => b.remove());
                        }, i * 140);
                    }
                }

                function updateCauldron(){
                    const mixed = mixRyb(cauldronContent.map(c => c.ryb));
                    const hex   = rgbToHex(mixed).toUpperCase();

                    fill.style.background = hex;
                    hexSwatch.style.background = hex;
                    hexCode.textContent = hex;

                    dropHint.style.display = cauldronContent.length ? 'none' : 'block';

                    ingredientsRow.innerHTML = '';

                    });

                    undoBtn.disabled  = cauldronContent.length === 0;
                    resetBtn.disabled = cauldronContent.length === 0;
                }

                updateCauldron();
            };

            // Build demo panel cards
            function buildDemoPanel(){
                const grid = document.getElementById('demo-grid');
                if(!grid) return;
                grid.innerHTML = '';
                const demoList = [
                    { id: 'star-selector', title: '0–5 Star Selector', desc: 'Asymptotic star rating — hold the buttons to change. Slows dramatically near 0 and 5. Bounce animation at max!' },
                    { id: 'runtarget', title: '🏃 RunTarget', desc: 'Set a min & max distance range, and get a random target on the map from your current location. Uses Leaflet + OpenStreetMap.' },
                    { id: 'element-extractor', title: '🔍 Element Extractor', desc: 'Enter any URL and a CSS selector to extract and preview a specific element from that page. Uses a CORS proxy and sandboxed iframe.' },
                    { id: 'color-mixer', title: '🎨 Colour Mixer', desc: 'Drag or click base colours into the cauldron to mix them using RYB pigment theory (the artist\'s colour wheel). Get the hex code of the result!' }
                ];
                for(const demo of demoList){
                    const card = document.createElement('div');
                    card.className = 'demo-card';
                    const h3 = document.createElement('h3');
                    h3.textContent = demo.title;
                    const p = document.createElement('p');
                    p.className = 'demo-desc';
                    p.textContent = demo.desc;
                    const target = document.createElement('div');
                    card.appendChild(h3);
                    card.appendChild(p);
                    card.appendChild(target);
                    grid.appendChild(card);
                    if(DEMOS[demo.id]) DEMOS[demo.id](target);
                }
            }

            // ---- Reports ----
            const reportsEl = document.getElementById('reports');

            async function loadReports(){
                try{
                    const r = await fetch('papers/list.json', {cache:'no-store'});
                    if(!r.ok) throw new Error('Could not load papers/list.json');
                    const list = await r.json();
                    if(!Array.isArray(list) || list.length === 0){
                        reportsEl.innerHTML = '<div class="reports-empty">No reports yet.</div>';
                        return;
                    }
                    reportsEl.innerHTML = '';
                    // Sort: in-progress first, then by startDate descending
                    const sorted = [...list].sort((a,b) => {
                        if(a.status === 'in-progress' && b.status !== 'in-progress') return -1;
                        if(b.status === 'in-progress' && a.status !== 'in-progress') return 1;
                        return (b.startDate || '').localeCompare(a.startDate || '');
                    });
                    for(const report of sorted){
                        renderReport(report);
                    }
                }catch(err){
                    console.error(err);
                    reportsEl.innerHTML = '<div class="reports-empty">Failed to load reports.</div>';
                }
            }

            function renderReport(report){
                const d = document.createElement('details');
                d.className = 'report';

                const s = document.createElement('summary');
                s.className = 'report-header';
                s.textContent = report.title || 'Untitled Report';

                // Tags in header
                if(report.tags && report.tags.length){
                    const tagsRow = document.createElement('span');
                    tagsRow.className = 'tags-row';
                    tagsRow.innerHTML = buildTagBadges(report.tags);
                    s.appendChild(tagsRow);
                }

                const meta = document.createElement('div');
                meta.className = 'report-meta';
                const statusClass = report.status === 'completed' ? 'completed' : 'in-progress';
                const statusIcon = report.status === 'completed' ? '✅' : '🔄';
                const statusLabel = report.status === 'completed' ? 'Completed' : 'In Progress';
                const dateRange = report.startDate
                    ? (report.endDate ? `${report.startDate} → ${report.endDate}` : `${report.startDate} → ongoing`)
                    : '';
                meta.innerHTML = `<span class="report-status ${statusClass}">${statusIcon} ${statusLabel}</span>`
                    + (dateRange ? ` <span>${dateRange}</span>` : '');

                d.appendChild(s);
                d.appendChild(meta);

                // Day entries container (loaded on first expand)
                const daysContainer = document.createElement('div');
                daysContainer.className = 'report-days';
                d.appendChild(daysContainer);

                let loaded = false;
                d.addEventListener('toggle', async () => {
                    if(!d.open || loaded) return;
                    loaded = true;
                    if(!report.file){
                        daysContainer.innerHTML = '<div class="reports-empty">No file specified.</div>';
                        return;
                    }
                    try{
                        const r = await fetch('papers/' + report.file, {cache:'no-store'});
                        if(!r.ok){
                            daysContainer.innerHTML = '<div class="reports-empty">Failed to load ' + report.file + '</div>';
                            return;
                        }
                        const txt = await r.text();
                        const { tags, cleanText } = extractTags(txt);
                        const sections = parseReportSections(cleanText);
                        if(!sections.length){
                            daysContainer.innerHTML = '<div class="reports-empty">No entries yet.</div>';
                            return;
                        }
                        // Update day count in meta
                        const countSpan = document.createElement('span');
                        countSpan.textContent = `${sections.length} day${sections.length !== 1 ? 's' : ''}`;
                        meta.appendChild(countSpan);
                        for(const sec of sections){
                            const dayEl = document.createElement('div');
                            dayEl.className = 'report-day';
                            const header = document.createElement('div');
                            header.className = 'report-day-header';
                            header.textContent = sec.date ? `📅 ${sec.date}` : 'Entry';
                            if(sec.label) header.textContent += ` — ${sec.label}`;
                            dayEl.appendChild(header);
                            const content = document.createElement('div');
                            content.className = 'report-day-content';
                            content.innerHTML = renderContent(sec.body);
                            dayEl.appendChild(content);
                            daysContainer.appendChild(dayEl);
                        }
                    }catch(e){
                        daysContainer.innerHTML = '<div class="reports-empty">Error: ' + e.message + '</div>';
                    }
                });

                reportsEl.appendChild(d);
            }

            // Parse a report file into day sections.
            // Delimiter: a line matching --- YYYY-MM-DD --- or --- YYYY-MM-DD — label ---
            // Content before the first delimiter is treated as a section with no date.
            function parseReportSections(txt){
                const lines = txt.split('\n');
                const sections = [];
                const delimRe = /^---\s*(\d{4}-\d{2}-\d{2})(?:\s*[—–\-]+\s*(.+?))?\s*---\s*$/;
                let current = null;
                for(const line of lines){
                    const m = delimRe.exec(line);
                    if(m){
                        if(current) sections.push(current);
                        current = { date: m[1], label: (m[2] || '').trim(), bodyLines: [] };
                    } else {
                        if(!current) current = { date: '', label: '', bodyLines: [] };
                        current.bodyLines.push(line);
                    }
                }
                if(current) sections.push(current);
                // Trim leading/trailing blank lines and build body string
                return sections.map(s => {
                    const body = s.bodyLines.join('\n').trim();
                    return { date: s.date, label: s.label, body };
                }).filter(s => s.body.length > 0);
            }

            // Kick off
            loadTagDefs().then(() => {
                loadList().then(() => {
                    // Render tag chart once all posts are loaded
                    setTimeout(renderTagChart, 1500);
                });
            });
            loadCalendarData();
            loadStats();
            loadReports();
            buildDemoPanel();
        </script>
    </body>
</html>
